{% extends 'base.html' %}

{% block content %}
<div class="row">
    <!-- System Stats Widget -->
    <div class="col-md-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-server me-2"></i>System Status</h5>
                <div class="mt-4">
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="small text-light">CPU LOAD</span>
                            <span id="cpu-text" class="small fw-bold text-accent">0%</span>
                        </div>
                        <div class="progress bg-dark" style="height: 6px;">
                            <div id="cpu-bar" class="progress-bar bg-accent" role="progressbar" style="width: 0%; background-color: #3fb950;"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="small text-light">RAM USAGE</span>
                            <span id="ram-text" class="small fw-bold text-info">0%</span>
                        </div>
                        <div class="progress bg-dark" style="height: 6px;">
                            <div id="ram-bar" class="progress-bar bg-info" role="progressbar" style="width: 0%;"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="small text-light">DISK USAGE</span>
                            <span id="disk-text" class="small fw-bold text-warning">0%</span>
                        </div>
                        <div class="progress bg-dark" style="height: 6px;">
                            <div id="disk-bar" class="progress-bar bg-warning" role="progressbar" style="width: 0%;"></div>
                        </div>
                    </div>
                    <hr class="border-secondary opacity-25">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small text-light">CPU TEMP</span>
                        <span id="temp-text" class="small text-danger">--°C</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small text-light">LOCAL IP</span>
                        <span id="ip-text" class="small text-info">--</span>
                    </div>
                    <hr class="border-secondary opacity-25">
                    <p class="small text-light text-center mt-3 opacity-50"><i class="fas fa-clock me-1"></i> Uptime tracker active</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Links Widget -->
    <div class="col-md-8">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-tools me-2"></i>Pentest Toolbox</h5>
                <div class="row mt-3 g-3">
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://gchq.github.io/CyberChef/" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-flask fa-2x mb-2 text-accent"></i>
                                <div class="small">CyberChef</div>
                            </div>
                        </a>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://revshells.com" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-terminal fa-2x mb-2 text-danger"></i>
                                <div class="small">RevShells</div>
                            </div>
                        </a>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://gtfobins.github.io/" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-box-open fa-2x mb-2 text-warning"></i>
                                <div class="small">GTFOBins</div>
                            </div>
                        </a>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://book.hacktricks.xyz/" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-book fa-2x mb-2 text-info"></i>
                                <div class="small">HackTricks</div>
                            </div>
                        </a>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://www.exploit-db.com/" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-bug fa-2x mb-2 text-secondary"></i>
                                <div class="small">Exploit-DB</div>
                            </div>
                        </a>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://lolbas-project.github.io/" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-window-maximize fa-2x mb-2 text-light"></i>
                                <div class="small">LOLBAS</div>
                            </div>
                        </a>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://shodan.io" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-search fa-2x mb-2 text-danger"></i>
                                <div class="small">Shodan</div>
                            </div>
                        </a>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="https://pentestmonkey.net/" target="_blank" class="text-decoration-none">
                            <div class="p-3 border border-secondary rounded text-center hover-card">
                                <i class="fas fa-paw fa-2x mb-2 text-warning"></i>
                                <div class="small">Monkey</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <!-- Elfsight Twitter Feed -->
    <div class="col-md-12">
        <script src="https://elfsightcdn.com/platform.js" async></script>
        <div class="elfsight-app-94b92f32-7849-468e-af4f-7b1df51ad81b" data-elfsight-app-lazy></div>
    </div>
</div>

<style>
    .hover-card {
        transition: all 0.2s;
        background-color: #0d1117;
    }
    .hover-card:hover {
        border-color: #58a6ff !important;
        background-color: #1c2128;
        transform: translateY(-2px);
    }
    .hover-card div {
        color: #d1d1d1;
    }
</style>
{% endblock %}
