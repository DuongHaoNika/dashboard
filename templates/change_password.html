{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4"><i class="fas fa-key me-2"></i>Change Password</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="current_password" class="form-label text-light small">CURRENT PASSWORD</label>
                        <input type="password" name="current_password" class="form-control bg-dark text-light border-secondary" id="current_password" required>
                    </div>
                    <hr class="border-secondary opacity-25">
                    <div class="mb-3">
                        <label for="new_password" class="form-label text-light small">NEW PASSWORD</label>
                        <input type="password" name="new_password" class="form-control bg-dark text-light border-secondary" id="new_password" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label text-light small">CONFIRM NEW PASSWORD</label>
                        <input type="password" name="confirm_password" class="form-control bg-dark text-light border-secondary" id="confirm_password" required>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100">CANCEL</a>
                        <button type="submit" class="btn btn-primary w-100">UPDATE PASSWORD</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
